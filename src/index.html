<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Night Vibe Planner</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__inner">
        <div class="header__logo">
          <span class="header__icon">🎬</span>
          <h1 class="header__title">Movie Night <span>Vibe Planner</span></h1>
        </div>
        <p class="header__sub">Pick a movie. Find your food. Set the vibe.</p>
      </div>
    </header>

    <main class="main">
      <!-- Search Form -->
      <section class="search-section">
        <form class="search-form" id="searchForm">
          <div class="search-form__group">
            <label for="movieInput" class="search-form__label">Movie Title</label>
            <input
              type="text"
              id="movieInput"
              class="search-form__input"
              placeholder="e.g. Inception, The Dark Knight..."
              autocomplete="off"
              required
            />
          </div>
          <div class="search-form__group">
            <label for="zipInput" class="search-form__label">Your Zip Code</label>
            <input
              type="text"
              id="zipInput"
              class="search-form__input"
              placeholder="e.g. 84601"
              maxlength="10"
              required
            />
          </div>
          <button type="submit" class="search-form__btn" id="searchBtn">
            <span class="btn-text">Plan My Night</span>
            <span class="btn-loader hidden">Loading...</span>
          </button>
        </form>
      </section>

      <!-- Error Banner -->
      <div class="error-banner hidden" id="errorBanner">
        <span id="errorMessage">Something went wrong. Please try again.</span>
      </div>

      <!-- Results -->
      <section class="results hidden" id="results">
        <!-- Movie Card -->
        <div class="movie-card" id="movieCard">
          <div class="movie-card__poster-wrap">
            <img id="moviePoster" class="movie-card__poster" src="" alt="" />
            <div class="movie-card__poster-placeholder hidden" id="posterPlaceholder">🎥</div>
          </div>
          <div class="movie-card__info">
            <div class="movie-card__meta">
              <span class="badge" id="movieYear"></span>
              <span class="badge badge--genre" id="movieGenre"></span>
              <span class="badge badge--rating" id="movieRating">⭐ <span id="movieRatingVal"></span></span>
            </div>
            <h2 class="movie-card__title" id="movieTitle"></h2>
            <p class="movie-card__director">Directed by <strong id="movieDirector"></strong></p>
            <p class="movie-card__plot" id="moviePlot"></p>
          </div>
        </div>

        <!-- Restaurants -->
        <div class="restaurants-section">
          <h3 class="restaurants-section__heading">🍕 Restaurants Near You</h3>
          <p class="restaurants-section__sub">Top-rated spots for delivery or pickup tonight</p>
          <div class="restaurant-grid" id="restaurantGrid"></div>
        </div>
      </section>

      <!-- Search History -->
      <section class="history-section" id="historySection">
        <h3 class="history-section__heading">Recent Searches</h3>
        <ul class="history-list" id="historyList"></ul>
      </section>
    </main>

    <footer class="footer">
      <p>Powered by OMDb &amp; Yelp Fusion</p>
    </footer>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
